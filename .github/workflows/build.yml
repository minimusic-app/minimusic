name: Build & Release

on:
  push:
    tags:
      - "v*.*.*" # triggers on v0.0.1-beta, v1.2.3, etc.

permissions:
  contents: write # needed to create releases and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: minimusic-windows.zip
            executable: minimusic-v0-0-1-beta.exe

          - os: ubuntu-latest
            asset_name: minimusic-linux.zip
            executable: minimusic-v0-0-1-beta

          - os: macos-latest
            asset_name: minimusic-macos.zip
            executable: minimusic-v0-0-1-beta

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==4.1.2

      # ── Linux: Qt system libs ────────────────────────────────────────────────
      - name: Install Qt system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            patchelf \
            ccache

      # ── macOS: ccache ────────────────────────────────────────────────────────
      - name: Install ccache (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ccache

      # ── Windows: ccache ──────────────────────────────────────────────────────
      - name: Install ccache (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ccache --no-progress

      # ── Nuitka cache (speeds up subsequent builds) ───────────────────────────
      - name: Cache Nuitka build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nuitka
            ~/AppData/Local/Nuitka/Nuitka
          key: nuitka-${{ matrix.os }}-${{ hashFiles('src/**/*.py', 'requirements.txt') }}
          restore-keys: |
            nuitka-${{ matrix.os }}-

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build with Nuitka (Windows)
        if: matrix.os == 'windows-latest'
        run: >
          python -m nuitka
          --standalone
          --onefile
          --windows-console-mode=disable
          --enable-plugin=pyqt6
          --assume-yes-for-downloads
          --output-filename=minimusic-v0-0-1-beta
          --output-dir=dist
          src/minimusic/main.py

      - name: Build with Nuitka (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: >
          python -m nuitka
          --standalone
          --onefile
          --enable-plugin=pyqt6
          --assume-yes-for-downloads
          --output-filename=minimusic-v0-0-1-beta
          --output-dir=dist
          src/minimusic/main.py

      - name: Build with Nuitka (macOS)
        if: matrix.os == 'macos-latest'
        run: >
          python -m nuitka
          --standalone
          --onefile
          --enable-plugin=pyqt6
          --macos-create-app-bundle
          --assume-yes-for-downloads
          --output-filename=minimusic-v0-0-1-beta
          --output-dir=dist
          src/minimusic/main.py

      # ── Zip the output ───────────────────────────────────────────────────────
      - name: Zip artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist\minimusic-v0-0-1-beta.exe -DestinationPath dist\minimusic-windows.zip
        shell: pwsh

      - name: Zip artifact (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          zip -r ${{ matrix.asset_name }} minimusic-v0-0-1-beta*

      # ── Upload to the release ────────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true # auto-generates changelog from commits
